
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }

  .app {
    width: 380px; background: #05010f;
    font-family: 'Orbitron', sans-serif;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
    border-radius: 24px; min-height: 700px;
  }

  .grid-lines {
    position: absolute; inset: 0; pointer-events: none; z-index: 0; opacity: 0.05;
    background-image: linear-gradient(rgba(120,80,255,0.6) 1px,transparent 1px),
      linear-gradient(90deg,rgba(120,80,255,0.6) 1px,transparent 1px);
    background-size: 40px 40px; animation: gridMove 8s linear infinite;
  }
  @keyframes gridMove { from{background-position:0 0;} to{background-position:40px 40px;} }

  .stars { position:absolute; inset:0; pointer-events:none; z-index:0; }
  .star { position:absolute; border-radius:50%; background:white; animation:twinkle var(--d) ease-in-out infinite alternate; }
  @keyframes twinkle { from{opacity:0.05;} to{opacity:0.6;} }

  .neon-border { position:absolute; inset:0; border-radius:24px; pointer-events:none; z-index:20; box-shadow:inset 0 0 30px rgba(124,58,237,0.1), 0 0 0 1px rgba(124,58,237,0.3); }
  .scan-line { position:absolute; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,rgba(124,58,237,0.6),rgba(167,139,250,0.9),rgba(124,58,237,0.6),transparent); animation:scanMove 4s linear infinite; z-index:2; pointer-events:none; }
  @keyframes scanMove { from{top:0;opacity:0;} 5%{opacity:1;} 95%{opacity:1;} to{top:100%;opacity:0;} }

  /* ===== TOP BANNER (same as home) ===== */
  .top-banner {
    position: relative; z-index: 10;
    background: linear-gradient(135deg,#0a0520,#0d0730,#0a051a,#060218);
    border-bottom: 1px solid rgba(124,58,237,0.4);
    padding: 12px 0 14px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; flex-shrink: 0;
  }

  .banner-scan {
    position: absolute; left:0; right:0; height:1px;
    background: linear-gradient(90deg,transparent 0%,rgba(56,189,248,0) 10%,rgba(124,58,237,0.8) 40%,rgba(56,189,248,1) 50%,rgba(124,58,237,0.8) 60%,rgba(56,189,248,0) 90%,transparent 100%);
    animation: bannerScan 3s ease-in-out infinite; pointer-events:none; z-index:2;
  }
  @keyframes bannerScan { 0%{top:0;opacity:0;} 10%{opacity:1;} 90%{opacity:1;} 100%{top:100%;opacity:0;} }

  .circuit-left, .circuit-right { flex:1; height:70px; position:relative; overflow:hidden; }
  .circuit-left svg, .circuit-right svg { width:100%; height:100%; }

  /* balance on the right side of circuit */
  .circuit-right { display:flex; align-items:center; justify-content:flex-start; padding-left:8px; }
  .circuit-right-inner { flex:1; height:70px; }

  .balance-chip-banner {
    flex-shrink:0;
    background:rgba(251,191,36,0.12);
    border:1px solid rgba(251,191,36,0.4);
    border-radius:20px;
    padding:6px 12px;
    display:flex; align-items:center; gap:5px;
    margin-right:10px;
    flex-direction:column;
  }
  .balance-chip-banner .bal-num {
    font-size:18px; font-weight:900; line-height:1;
    background:linear-gradient(135deg,#fbbf24,#fde68a);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    animation: numGlow 2s ease-in-out infinite;
  }
  @keyframes numGlow { 0%,100%{filter:drop-shadow(0 0 4px rgba(251,191,36,0.3));} 50%{filter:drop-shadow(0 0 12px rgba(251,191,36,0.8));} }
  .balance-chip-banner .bal-label { font-size:7px; color:rgba(251,191,36,0.55); letter-spacing:1px; }

  .banner-logo { width:80px; height:80px; position:relative; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
  .neon-ring { position:absolute; inset:-10px; border-radius:50%; border:2px solid rgba(99,102,241,0.7); box-shadow:0 0 8px 2px rgba(99,102,241,0.6),0 0 20px 5px rgba(124,58,237,0.4),0 0 40px 8px rgba(56,189,248,0.2),inset 0 0 15px rgba(124,58,237,0.3); animation:ringPulse 2.5s ease-in-out infinite; }
  @keyframes ringPulse { 0%,100%{box-shadow:0 0 8px 2px rgba(99,102,241,0.6),0 0 20px 5px rgba(124,58,237,0.4),0 0 40px 8px rgba(56,189,248,0.2),inset 0 0 15px rgba(124,58,237,0.3);} 50%{box-shadow:0 0 18px 5px rgba(99,102,241,1),0 0 40px 12px rgba(124,58,237,0.7),0 0 70px 18px rgba(56,189,248,0.4),inset 0 0 30px rgba(124,58,237,0.6);} }
  .neon-ring2 { position:absolute; inset:-18px; border-radius:50%; border:1px dashed rgba(56,189,248,0.4); animation:ringRotate 10s linear infinite; }
  @keyframes ringRotate { from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
  .ring2-dot { position:absolute; width:6px; height:6px; background:#38bdf8; border-radius:50%; top:-3px; left:50%; transform:translateX(-50%); box-shadow:0 0 8px #38bdf8; }
  .logo-halo { position:absolute; inset:-25px; border-radius:50%; background:radial-gradient(ellipse,rgba(99,102,241,0.35) 0%,rgba(124,58,237,0.2) 40%,transparent 70%); animation:haloPulse 2.5s ease-in-out infinite; z-index:1; }
  @keyframes haloPulse { 0%,100%{transform:scale(1);opacity:0.7;} 50%{transform:scale(1.2);opacity:1;} }
  .logo-img { width:80px; height:80px; border-radius:50%; position:relative; z-index:2; object-fit:cover; }

  /* shop label under banner */
  .shop-label {
    position:relative; z-index:10;
    background:linear-gradient(90deg,rgba(124,58,237,0.15),rgba(124,58,237,0.05));
    border-bottom:1px solid rgba(124,58,237,0.25);
    padding:8px 16px;
    display:flex; align-items:center; gap:8px;
  }
  .shop-label-text { font-size:13px; font-weight:700; color:#e0d7ff; letter-spacing:2px; }
  .shop-label-line { flex:1; height:1px; background:linear-gradient(90deg,rgba(124,58,237,0.5),transparent); }

  /* grid */
  .shop-scroll {
    position:relative; z-index:10;
    overflow-y:auto; flex:1;
    padding:12px 12px 8px;
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:12px;
    scrollbar-width:none;
  }
  .shop-scroll::-webkit-scrollbar { display:none; }

  .item-card {
    background:rgba(15,5,40,0.85);
    border:1px solid rgba(124,58,237,0.3);
    border-radius:16px;
    display:flex; flex-direction:column;
    overflow:hidden;
    transition:border-color 0.2s, box-shadow 0.2s;
  }
  .item-card:hover { border-color:rgba(167,139,250,0.7); box-shadow:0 0 16px rgba(124,58,237,0.3); }
  .item-card.purchased { border-color:rgba(34,197,94,0.5); box-shadow:0 0 12px rgba(34,197,94,0.2); }

  .item-img {
    width:100%; aspect-ratio:1/1;
    display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg,#0f0328,#1a0545);
    font-size:52px;
    border-bottom:1px solid rgba(124,58,237,0.2);
    position:relative; overflow:hidden;
  }
  .item-img::after { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at 40% 35%,rgba(124,58,237,0.15),transparent 70%); }

  .item-info { padding:10px 10px 8px; display:flex; flex-direction:column; gap:6px; flex:1; }
  .item-name { font-size:10.5px; font-weight:700; color:#d4ccff; letter-spacing:0.5px; line-height:1.35; text-align:center; min-height:28px; display:flex; align-items:center; justify-content:center; }

  .item-price {
    display:flex; align-items:center; justify-content:center; gap:4px;
    background:rgba(251,191,36,0.1); border:1px solid rgba(251,191,36,0.25);
    border-radius:8px; padding:4px 6px;
  }
  .price-num { font-size:13px; font-weight:700; color:#fbbf24; }
  .price-label { font-size:9px; color:rgba(251,191,36,0.6); letter-spacing:1px; }

  .buy-btn {
    width:100%; padding:7px 4px;
    background:linear-gradient(135deg,rgba(124,58,237,0.8),rgba(79,70,229,0.8));
    border:1px solid rgba(167,139,250,0.5);
    border-radius:10px; color:#e0d7ff;
    font-family:'Orbitron',sans-serif; font-size:10px; font-weight:700; letter-spacing:1px;
    cursor:pointer; transition:all 0.2s;
  }
  .buy-btn:hover { background:linear-gradient(135deg,rgba(139,92,246,0.9),rgba(99,102,241,0.9)); box-shadow:0 0 12px rgba(124,58,237,0.5); }
  .buy-btn:active { transform:scale(0.97); }
  .buy-btn.bought { background:linear-gradient(135deg,rgba(22,163,74,0.6),rgba(16,185,129,0.6)); border-color:rgba(34,197,94,0.5); color:#86efac; cursor:default; font-size:8px; letter-spacing:0.5px; }

  .nav-bar {
    position:relative; z-index:10;
    background:rgba(10,3,28,0.97);
    border-top:1px solid rgba(124,58,237,0.5);
    padding:10px 0 18px; flex-shrink:0;
  }
  .nav-items { display:flex; justify-content:space-around; align-items:center; }
  .nav-item { display:flex; flex-direction:column; align-items:center; gap:5px; cursor:pointer; padding:6px 8px; border-radius:14px; transition:all 0.25s; border:1px solid transparent; background:transparent; }
  .nav-item.active { background:linear-gradient(160deg,rgba(124,58,237,0.25),rgba(79,70,229,0.15)); border:1px solid rgba(167,139,250,0.55); box-shadow:0 0 14px rgba(124,58,237,0.3); }
  .nav-item:hover { background:rgba(124,58,237,0.15); }
  .nav-icon-3d { width:30px; height:30px; display:flex; align-items:center; justify-content:center; }
  .nav-label { font-family:'Orbitron',sans-serif; font-size:7.5px; color:#6b7280; letter-spacing:1px; text-transform:uppercase; }
  .nav-item.active .nav-label { color:#c4b5fd; }

  .modal-overlay { position:absolute; inset:0; z-index:50; background:rgba(5,1,15,0.88); display:flex; align-items:center; justify-content:center; padding:20px; border-radius:24px; }
  .modal-box { background:linear-gradient(135deg,#0f0328,#1a0545); border:1px solid rgba(124,58,237,0.6); border-radius:20px; padding:24px 20px 20px; width:100%; box-shadow:0 0 40px rgba(124,58,237,0.4); text-align:center; }
  .modal-icon { font-size:44px; margin-bottom:10px; }
  .modal-title { font-size:13px; font-weight:700; color:#e0d7ff; letter-spacing:1px; margin-bottom:8px; }
  .modal-product { font-size:11px; color:#a78bfa; margin-bottom:6px; letter-spacing:0.5px; }
  .modal-price { font-size:11px; color:rgba(251,191,36,0.8); margin-bottom:18px; }
  .modal-deficit { font-size:12px; font-weight:700; color:#ef4444; margin-bottom:16px; text-shadow:0 0 10px rgba(239,68,68,0.5); }
  .modal-btns { display:flex; gap:10px; }
  .modal-btn { flex:1; padding:10px; border-radius:12px; font-family:'Orbitron',sans-serif; font-size:11px; font-weight:700; letter-spacing:1px; cursor:pointer; transition:all 0.2s; border:none; }
  .modal-btn.confirm { background:linear-gradient(135deg,#7c3aed,#4f46e5); color:white; border:1px solid rgba(167,139,250,0.5); }
  .modal-btn.confirm:hover { box-shadow:0 0 16px rgba(124,58,237,0.6); }
  .modal-btn.cancel { background:rgba(255,255,255,0.05); color:#6b7280; border:1px solid rgba(107,114,128,0.3); }
  .modal-btn.cancel:hover { background:rgba(255,255,255,0.1); color:#9ca3af; }
  .modal-btn.close-btn { background:linear-gradient(135deg,rgba(124,58,237,0.6),rgba(79,70,229,0.6)); color:#e0d7ff; border:1px solid rgba(167,139,250,0.4); }
  .modal-success { font-size:11px; color:#86efac; margin-bottom:16px; letter-spacing:0.5px; line-height:1.5; }
</style>

let balance = 12;
const purchases = {};

const items = [
  { id:0, name:"עכבר גיימינג",        price:7,  icon:"🖱️" },
  { id:1, name:"משקפת מציאות מדומה",  price:9,  icon:"🥽" },
  { id:2, name:"מקלדת גיימינג",       price:10, icon:"⌨️" },
  { id:3, name:"אוזניות גיימינג",     price:10, icon:"🎧" },
  { id:4, name:"יום גיימינג לקבוצה", price:12, icon:"🎮" },
  { id:5, name:"סט רמקולי גיימינג",  price:15, icon:"🔊" },
  { id:6, name:"ערכת גיימר מלאה",    price:25, icon:"🏆" },
];

function updateBalance() {
  document.getElementById('balDisplay').textContent = balance;
}

function renderGrid() {
  const grid = document.getElementById('shopGrid');
  grid.innerHTML = '';
  items.forEach(item => {
    const bought = purchases[item.id];
    const card = document.createElement('div');
    card.className = 'item-card' + (bought ? ' purchased' : '');
    card.innerHTML = `
      <div class="item-img">${item.icon}</div>
      <div class="item-info">
        <div class="item-name">${item.name}</div>
        <div class="item-price">
          <span class="price-num">${item.price}</span>
          <span class="price-label">🪙 COINS</span>
        </div>
        <button class="buy-btn${bought?' bought':''}" onclick="handleBuy(${item.id})">${bought ? '✅ נרכש - ממתין שילוח' : 'רכישה'}</button>
      </div>
    `;
    grid.appendChild(card);
  });
}

function handleBuy(id) {
  if (purchases[id]) return;
  showConfirmModal(items[id]);
}

function showConfirmModal(item) {
  const o = document.getElementById('modalOverlay');
  o.style.display = 'flex';
  o.innerHTML = `
    <div class="modal-box">
      <div class="modal-icon">${item.icon}</div>
      <div class="modal-title">אישור רכישה</div>
      <div class="modal-product">${item.name}</div>
      <div class="modal-price">🪙 ${item.price} מטבעות אראגון</div>
      <div class="modal-btns">
        <button class="modal-btn cancel" onclick="closeModal()">ביטול</button>
        <button class="modal-btn confirm" onclick="confirmBuy(${item.id})">אישור ✓</button>
      </div>
    </div>`;
}

function confirmBuy(id) {
  const item = items[id];
  const o = document.getElementById('modalOverlay');
  const deficit = item.price - balance;
  if (deficit > 0) {
    o.innerHTML = `
      <div class="modal-box">
        <div class="modal-icon">❌</div>
        <div class="modal-title">יתרה לא מספיקה</div>
        <div class="modal-product">${item.name}</div>
        <div class="modal-deficit">חסרים לך ${deficit} מטבעות 🪙</div>
        <div style="font-size:10px;color:rgba(167,139,250,0.6);margin-bottom:16px;letter-spacing:0.5px;">המשך לצבור מטבעות ונסה שוב!</div>
        <div class="modal-btns">
          <button class="modal-btn close-btn" style="flex:1;" onclick="closeModal()">אישור</button>
        </div>
      </div>`;
  } else {
    balance -= item.price;
    purchases[id] = true;
    updateBalance();
    renderGrid();
    o.innerHTML = `
      <div class="modal-box">
        <div class="modal-icon">🎉</div>
        <div class="modal-title">נרכש בהצלחה!</div>
        <div class="modal-product">${item.name}</div>
        <div class="modal-success">הזמנתך התקבלה!<br>סטטוס: נרכש בהצלחה – ממתין לשילוח 📦</div>
        <div style="font-size:10px;color:rgba(251,191,36,0.6);margin-bottom:16px;">יתרה חדשה: ${balance} 🪙</div>
        <div class="modal-btns">
          <button class="modal-btn close-btn" style="flex:1;" onclick="closeModal()">סגור</button>
        </div>
      </div>`;
  }
}

function closeModal() {
  const o = document.getElementById('modalOverlay');
  o.style.display = 'none';
  o.innerHTML = '';
}

const starsEl = document.getElementById('stars');
for (let i = 0; i < 40; i++) {
  const s = document.createElement('div'); s.className = 'star';
  const sz = Math.random() * 2 + 0.5;
  s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${(Math.random()*3+1.5).toFixed(1)}s;animation-delay:${(Math.random()*3).toFixed(1)}s;`;
  starsEl.appendChild(s);
}

updateBalance();
renderGrid();
</script>
