function setNav(el) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
}
const starsEl = document.getElementById('stars');
for (let i = 0; i < 55; i++) {
  const s = document.createElement('div'); s.className = 'star';
  const size = Math.random() * 2.5 + 0.5;
  s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${(Math.random()*3+1.5).toFixed(1)}s;animation-delay:${(Math.random()*3).toFixed(1)}s;`;
  starsEl.appendChild(s);
}
const floatIcons = [
  {icon:'🕹️',x:8,y:25,d:5},{icon:'🥽',x:75,y:18,d:7},
  {icon:'🤖',x:60,y:68,d:6},{icon:'💻',x:4,y:60,d:8},{icon:'📱',x:83,y:45,d:5.5},
];
const floatEl = document.getElementById('floatIcons');
floatIcons.forEach((fi,i) => {
  const d = document.createElement('div'); d.className = 'float-icon';
  d.style.cssText = `left:${fi.x}%;top:${fi.y}%;--fd:${fi.d}s;animation-delay:${i*0.9}s`;
  d.textContent = fi.icon; floatEl.appendChild(d);
});
