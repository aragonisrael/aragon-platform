<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>אראגון - עדכונים</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{display:flex;justify-content:center;align-items:flex-start;min-height:100vh;background:#020008;padding:20px 0;font-family:'Orbitron',sans-serif}
.app{width:380px;background:#05010f;position:relative;overflow:hidden;display:flex;flex-direction:column;border-radius:24px;min-height:700px;box-shadow:0 0 60px rgba(124,58,237,0.3)}
.gl{position:absolute;inset:0;pointer-events:none;z-index:0;opacity:.05;background-image:linear-gradient(rgba(120,80,255,.6) 1px,transparent 1px),linear-gradient(90deg,rgba(120,80,255,.6) 1px,transparent 1px);background-size:40px 40px;animation:gm 8s linear infinite}
@keyframes gm{from{background-position:0 0}to{background-position:40px 40px}}
.stars{position:absolute;inset:0;pointer-events:none;z-index:0}
.star{position:absolute;border-radius:50%;background:white;animation:tw var(--d) ease-in-out infinite alternate}
@keyframes tw{from{opacity:.04}to{opacity:.5}}
.nb{position:absolute;inset:0;border-radius:24px;pointer-events:none;z-index:20;box-shadow:inset 0 0 30px rgba(124,58,237,.1),0 0 0 1px rgba(124,58,237,.3)}
.sl{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(124,58,237,.6),rgba(167,139,250,.9),rgba(124,58,237,.6),transparent);animation:sc 4s linear infinite;z-index:2;pointer-events:none}
@keyframes sc{from{top:0;opacity:0}5%{opacity:1}95%{opacity:1}to{top:100%;opacity:0}}

/* BANNER */
.tb{position:relative;z-index:10;background:linear-gradient(135deg,#0a0520,#0d0730,#0a051a,#060218);border-bottom:1px solid rgba(124,58,237,.4);padding:12px 0 14px;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.bsc{position:absolute;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(124,58,237,.8) 40%,rgba(56,189,248,1) 50%,rgba(124,58,237,.8) 60%,transparent);animation:bsca 3s ease-in-out infinite;pointer-events:none;z-index:2}
@keyframes bsca{0%{top:0;opacity:0}10%{opacity:1}90%{opacity:1}100%{top:100%;opacity:0}}
.cside{flex:1;height:70px}
.crw{flex:1;display:flex;align-items:center}
.crsvg{flex:1;height:70px}
.bchip{flex-shrink:0;margin-right:10px;background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.4);border-radius:20px;padding:6px 12px;display:flex;flex-direction:column;align-items:center;gap:2px}
.bn{font-size:18px;font-weight:900;line-height:1;background:linear-gradient(135deg,#fbbf24,#fde68a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:ng 2s ease-in-out infinite}
@keyframes ng{0%,100%{filter:drop-shadow(0 0 4px rgba(251,191,36,.3))}50%{filter:drop-shadow(0 0 12px rgba(251,191,36,.8))}}
.bl{font-size:7px;color:rgba(251,191,36,.55);letter-spacing:1px}
.blogo{width:80px;height:80px;position:relative;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.nr{position:absolute;inset:-10px;border-radius:50%;border:2px solid rgba(99,102,241,.7);animation:rp 2.5s ease-in-out infinite}
@keyframes rp{0%,100%{box-shadow:0 0 8px 2px rgba(99,102,241,.6),0 0 20px 5px rgba(124,58,237,.4),0 0 40px 8px rgba(56,189,248,.2)}50%{box-shadow:0 0 18px 5px rgba(99,102,241,1),0 0 40px 12px rgba(124,58,237,.7),0 0 70px 18px rgba(56,189,248,.4)}}
.nr2{position:absolute;inset:-18px;border-radius:50%;border:1px dashed rgba(56,189,248,.4);animation:rr 10s linear infinite}
@keyframes rr{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.r2d{position:absolute;width:6px;height:6px;background:#38bdf8;border-radius:50%;top:-3px;left:50%;transform:translateX(-50%);box-shadow:0 0 8px #38bdf8}
.lhalo{position:absolute;inset:-25px;border-radius:50%;background:radial-gradient(ellipse,rgba(99,102,241,.35) 0%,rgba(124,58,237,.2) 40%,transparent 70%);animation:hp 2.5s ease-in-out infinite;z-index:1}
@keyframes hp{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.2);opacity:1}}
.limg{width:80px;height:80px;border-radius:50%;position:relative;z-index:2;object-fit:cover}

/* SCROLL */
.us{position:relative;z-index:10;overflow-y:auto;flex:1;padding:14px 12px 8px;scrollbar-width:none}
.us::-webkit-scrollbar{display:none}

/* section header */
.sh{display:flex;align-items:center;gap:8px;margin-bottom:12px;margin-top:4px}
.shl{flex:1;height:1px}
.shl.l{background:linear-gradient(90deg,transparent,rgba(124,58,237,.55))}
.shl.r{background:linear-gradient(270deg,transparent,rgba(124,58,237,.55))}
.sbg{font-size:9px;font-weight:700;letter-spacing:2px;padding:4px 12px;border-radius:20px;white-space:nowrap}
.sbg.order{background:rgba(56,189,248,.12);border:1px solid rgba(56,189,248,.4);color:#7dd3fc}
.sbg.msgs{background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.45);color:#a78bfa}

/* ORDER CARD */
.oc{background:rgba(15,5,40,.9);border:1px solid rgba(56,189,248,.3);border-radius:16px;padding:14px 16px 16px;margin-bottom:12px;position:relative;overflow:hidden}
.oc::before{content:'';position:absolute;top:-30px;right:-30px;width:90px;height:90px;border-radius:50%;background:radial-gradient(ellipse,rgba(56,189,248,.12),transparent 70%);pointer-events:none}
.ot{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.oiw{width:40px;height:40px;border-radius:12px;background:rgba(56,189,248,.12);border:1px solid rgba(56,189,248,.3);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.oiw svg{width:22px;height:22px}
.om{flex:1}
.on{font-size:11px;font-weight:700;color:#e0d7ff;margin-bottom:3px}
.od{font-size:9px;color:rgba(125,211,252,.6);letter-spacing:1px}
.opr{font-size:13px;font-weight:700;color:#fbbf24}

/* progress */
.pt{position:relative;display:flex;align-items:center;margin-bottom:10px}
.pl{flex:1;height:3px;border-radius:2px}
.pl.done{background:linear-gradient(90deg,#38bdf8,#7c3aed)}
.pl.pend{background:rgba(124,58,237,.2)}
.pd{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;z-index:1}
.pd.done{background:linear-gradient(135deg,#38bdf8,#7c3aed);box-shadow:0 0 10px rgba(56,189,248,.5)}
.pd.active{background:linear-gradient(135deg,#fbbf24,#f59e0b);box-shadow:0 0 12px rgba(251,191,36,.6);animation:ap 1.5s ease-in-out infinite}
.pd.pend{background:rgba(124,58,237,.2);border:1px solid rgba(124,58,237,.3)}
@keyframes ap{0%,100%{box-shadow:0 0 8px rgba(251,191,36,.4)}50%{box-shadow:0 0 18px rgba(251,191,36,.8)}}
.pd svg{width:12px;height:12px}
.plabels{display:flex;justify-content:space-between}
.plbl{font-size:7.5px;color:rgba(167,139,250,.6);letter-spacing:.5px;text-align:center;flex:1;line-height:1.3}
.plbl.done{color:#7dd3fc}
.plbl.active{color:#fbbf24;font-weight:700}

/* NOTIF CARDS */
.nc{background:rgba(15,5,40,.9);border:1px solid rgba(124,58,237,.28);border-radius:14px;margin-bottom:10px;overflow:hidden;cursor:pointer;transition:border-color .2s,box-shadow .2s;position:relative}
.nc:hover{border-color:rgba(167,139,250,.55);box-shadow:0 0 14px rgba(124,58,237,.25)}
.nc.unread{border-color:rgba(124,58,237,.5)}
.nc.unread::before{content:'';position:absolute;top:12px;right:12px;width:8px;height:8px;border-radius:50%;background:#a855f7;box-shadow:0 0 8px rgba(168,85,247,.7);z-index:2}
.nc.read{opacity:.72}
.nh{display:flex;align-items:center;gap:10px;padding:12px 14px 10px}
.niw{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.niw.admin{background:rgba(124,58,237,.18);border:1px solid rgba(124,58,237,.4)}
.niw.coach{background:rgba(56,189,248,.12);border:1px solid rgba(56,189,248,.35)}
.niw.reward{background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.35)}
.niw svg{width:20px;height:20px}
.nm{flex:1;min-width:0}
.nti{font-size:11px;font-weight:700;color:#e0d7ff;letter-spacing:.3px;margin-bottom:2px}
.nda{font-size:8.5px;color:rgba(167,139,250,.55);letter-spacing:1px}
.nch{flex-shrink:0;transition:transform .25s}
.nch svg{width:16px;height:16px;stroke:rgba(124,58,237,.6);fill:none;strokeWidth:2;stroke-linecap:round;stroke-linejoin:round}
.nc.open .nch{transform:rotate(180deg)}
.nb2{max-height:0;overflow:hidden;transition:max-height .35s ease}
.nc.open .nb2{max-height:200px}
.nbi{padding:0 14px 14px;border-top:1px solid rgba(124,58,237,.15);padding-top:10px;font-size:10px;color:rgba(196,181,253,.75);letter-spacing:.3px;line-height:1.7;font-family:'Orbitron',sans-serif}
.rbdg{display:inline-block;margin-top:8px;font-size:8px;color:rgba(167,139,250,.5);border:1px solid rgba(124,58,237,.2);border-radius:20px;padding:2px 8px;letter-spacing:1px}

/* NAV */
.nav{position:relative;z-index:10;background:rgba(10,3,28,.97);border-top:1px solid rgba(124,58,237,.5);padding:10px 0 18px;flex-shrink:0}
.ni{display:flex;justify-content:space-around;align-items:center}
.n{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;padding:6px 8px;border-radius:14px;transition:all .25s;border:1px solid transparent;background:transparent}
.n.act{background:linear-gradient(160deg,rgba(124,58,237,.25),rgba(79,70,229,.15));border:1px solid rgba(167,139,250,.55);box-shadow:0 0 14px rgba(124,58,237,.3)}
.nd{width:30px;height:30px;display:flex;align-items:center;justify-content:center}
.nl{font-family:'Orbitron',sans-serif;font-size:7.5px;color:#6b7280;letter-spacing:1px;text-transform:uppercase}
.n.act .nl{color:#c4b5fd}
</style>
</head>
<body>
<div class="app" id="app">
<div class="sl"></div><div class="nb"></div><div class="gl"></div>
<div class="stars" id="stars"></div>

<!-- BANNER -->
<div class="tb">
  <div class="bsc"></div>
  <div class="cside">
    <svg viewBox="0 0 110 70" width="100%" height="100%">
      <line x1="110" y1="35" x2="75" y2="35" stroke="#7c3aed" strokeWidth="1.5" opacity=".7"/>
      <line x1="75" y1="35" x2="55" y2="18" stroke="#7c3aed" strokeWidth="1" opacity=".5"/>
      <line x1="75" y1="35" x2="50" y2="35" stroke="#38bdf8" strokeWidth="1" opacity=".6"/>
      <line x1="110" y1="20" x2="65" y2="20" stroke="#4f46e5" strokeWidth="1" opacity=".4"/>
      <line x1="110" y1="52" x2="80" y2="52" stroke="#6d28d9" strokeWidth="1" opacity=".35"/>
      <circle cx="75" cy="35" r="3" fill="#7c3aed" opacity=".9"/>
      <circle cx="50" cy="35" r="2.5" fill="#38bdf8" opacity=".8"/>
      <rect x="88" y="31" width="10" height="6" rx="2" fill="none" stroke="#7c3aed" strokeWidth="1" opacity=".5"/>
    </svg>
  </div>
  <div class="blogo">
    <div class="lhalo"></div><div class="nr"></div>
    <div class="nr2"><div class="r2d"></div></div>
    <img class="limg" id="logoImg" alt="Aragon"/>
  </div>
  <div class="crw">
    <div class="crsvg">
      <svg viewBox="0 0 110 70" width="100%" height="100%">
        <line x1="0" y1="35" x2="35" y2="35" stroke="#7c3aed" strokeWidth="1.5" opacity=".7"/>
        <line x1="35" y1="35" x2="55" y2="18" stroke="#7c3aed" strokeWidth="1" opacity=".5"/>
        <line x1="35" y1="35" x2="60" y2="35" stroke="#38bdf8" strokeWidth="1" opacity=".6"/>
        <line x1="0" y1="20" x2="45" y2="20" stroke="#4f46e5" strokeWidth="1" opacity=".4"/>
        <line x1="0" y1="52" x2="30" y2="52" stroke="#6d28d9" strokeWidth="1" opacity=".35"/>
        <circle cx="35" cy="35" r="3" fill="#7c3aed" opacity=".9"/>
        <circle cx="60" cy="35" r="2.5" fill="#38bdf8" opacity=".8"/>
        <rect x="10" y="31" width="10" height="6" rx="2" fill="none" stroke="#7c3aed" strokeWidth="1" opacity=".5"/>
      </svg>
    </div>
    <div class="bchip"><span class="bn">12</span><span class="bl">🪙 COINS</span></div>
  </div>
</div>

<!-- SCROLL -->
<div class="us">

  <div class="sh"><div class="shl l"></div><div class="sbg order">📦 מעקב הזמנות</div><div class="shl r"></div></div>

  <!-- Order 1: in transit -->
  <div class="oc">
    <div class="ot">
      <div class="oiw">
        <svg viewBox="0 0 24 24" fill="none" stroke="#38bdf8" strokeWidth="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 5v4h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>
        </svg>
      </div>
      <div class="om"><div class="on">🖱️ עכבר גיימינג</div><div class="od">הוזמן ב-12.05.2025</div></div>
      <div class="opr">7 🪙</div>
    </div>
    <div class="pt">
      <div class="pd done"><svg viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg></div>
      <div class="pl done"></div>
      <div class="pd active">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 5v4h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
      </div>
      <div class="pl pend"></div>
      <div class="pd pend">
        <svg viewBox="0 0 24 24" fill="none" stroke="rgba(124,58,237,0.5)" strokeWidth="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><path d="M12 22V7"/></svg>
      </div>
    </div>
    <div class="plabels">
      <div class="plbl done">✓ הזמנה<br>התקבלה</div>
      <div class="plbl active">⚡ בדרך<br>למדריך</div>
      <div class="plbl">מחכה לך<br>בחוג</div>
    </div>
  </div>

  <!-- Order 2: delivered -->
  <div class="oc" style="border-color:rgba(34,197,94,.3)">
    <div class="ot">
      <div class="oiw" style="background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.3)">
        <svg viewBox="0 0 24 24" fill="none" stroke="#4ade80" strokeWidth="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><path d="M12 22V7"/>
        </svg>
      </div>
      <div class="om"><div class="on" style="color:#86efac">🎧 אוזניות גיימינג</div><div class="od" style="color:rgba(74,222,128,.6)">הוזמן ב-03.05.2025</div></div>
      <div class="opr">10 🪙</div>
    </div>
    <div class="pt">
      <div class="pd done" style="background:linear-gradient(135deg,#22c55e,#16a34a);box-shadow:0 0 10px rgba(34,197,94,.5)"><svg viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg></div>
      <div class="pl done" style="background:linear-gradient(90deg,#22c55e,#16a34a)"></div>
      <div class="pd done" style="background:linear-gradient(135deg,#22c55e,#16a34a);box-shadow:0 0 10px rgba(34,197,94,.5)"><svg viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg></div>
      <div class="pl done" style="background:linear-gradient(90deg,#16a34a,#22c55e)"></div>
      <div class="pd done" style="background:linear-gradient(135deg,#22c55e,#16a34a);box-shadow:0 0 12px rgba(34,197,94,.6)"><svg viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg></div>
    </div>
    <div class="plabels">
      <div class="plbl" style="color:#4ade80">✓ הזמנה<br>התקבלה</div>
      <div class="plbl" style="color:#4ade80">✓ בדרך<br>למדריך</div>
      <div class="plbl" style="color:#4ade80;font-weight:700">✓ נמסר<br>לידיך!</div>
    </div>
  </div>

  <div class="sh" style="margin-top:18px"><div class="shl l"></div><div class="sbg msgs">🔔 הודעות מערכת</div><div class="shl r"></div></div>

  <div id="nlist"></div>
  <div style="height:8px"></div>
</div>

<!-- NAV -->
<div class="nav">
  <div class="ni">
    <button class="n"><div class="nd"><svg width="30" height="30" viewBox="0 0 30 30"><polygon points="15,3 27,13 3,13" fill="#7c3aed"/><polygon points="3,13 15,3 15,14" fill="#4c1d95" opacity=".9"/><rect x="6" y="13" width="18" height="13" rx="1" fill="#a78bfa"/><polygon points="24,13 27,10 27,22 24,26" fill="#5b21b6" opacity=".9"/><rect x="12" y="19" width="6" height="7" rx="1" fill="#4c1d95"/><circle cx="17" cy="23" r="1" fill="#c4b5fd"/></svg></div><span class="nl">בית</span></button>
    <button class="n"><div class="nd"><svg width="30" height="30" viewBox="0 0 30 30"><rect x="5" y="13" width="20" height="14" rx="2" fill="#a78bfa"/><polygon points="25,13 28,11 28,25 25,27" fill="#5b21b6" opacity=".9"/><polygon points="5,13 8,10 28,10 25,13" fill="#7c3aed"/><path d="M10 13 Q10 7 15 7 Q20 7 20 13" fill="none" stroke="#c4b5fd" strokeWidth="2" stroke-linecap="round"/></svg></div><span class="nl">חנות</span></button>
    <button class="n"><div class="nd"><svg width="30" height="30" viewBox="0 0 30 30"><rect x="5" y="8" width="18" height="20" rx="2" fill="#7c3aed"/><polygon points="23,8 26,6 26,26 23,28" fill="#4c1d95" opacity=".95"/><polygon points="5,8 8,6 26,6 23,8" fill="#a78bfa"/><rect x="11" y="5" width="8" height="5" rx="2" fill="#c4b5fd"/><line x1="8" y1="14" x2="18" y2="14" stroke="#c4b5fd" strokeWidth="1.5" stroke-linecap="round"/><line x1="8" y1="18" x2="16" y2="18" stroke="#c4b5fd" strokeWidth="1.5" stroke-linecap="round"/></svg></div><span class="nl">משימות</span></button>
    <button class="n"><div class="nd"><svg width="30" height="30" viewBox="0 0 30 30"><rect x="3" y="9" width="22" height="16" rx="2" fill="#a78bfa"/><polygon points="25,9 28,7 28,23 25,25" fill="#5b21b6" opacity=".9"/><polygon points="3,9 6,7 28,7 25,9" fill="#7c3aed"/><circle cx="11" cy="17" r="5" fill="#7c3aed"/><circle cx="11" cy="15" r="2.2" fill="#c4b5fd"/><path d="M6.5 22 Q11 19 15.5 22" fill="#c4b5fd"/></svg></div><span class="nl">פרופיל</span></button>
    <button class="n act"><div class="nd"><svg width="30" height="30" viewBox="0 0 30 30"><path d="M15 4 Q9 4 8 13 L7 20 L23 20 L22 13 Q21 4 15 4Z" fill="#a78bfa"/><path d="M19 4.5 Q22 6 22 13 L21.5 20 L23 20 L22 13 Q21.5 5.5 19 4.5Z" fill="#5b21b6" opacity=".85"/><rect x="5" y="19" width="20" height="3" rx="1.5" fill="#7c3aed"/><ellipse cx="15" cy="25" rx="3.5" ry="2" fill="#7c3aed"/><circle cx="22" cy="7" r="4" fill="#ef4444"/><text x="22" y="9.5" text-anchor="middle" font-size="5.5" fill="white" font-weight="bold">3</text></svg></div><span class="nl">עדכונים</span></button>
  </div>
</div>

const open={};

function render(){
  const l=document.getElementById('nlist'); l.innerHTML='';
  notifs.forEach(n=>{
    const d=document.createElement('div');
    d.className='nc '+(n.read?'read':'unread')+(open[n.id]?' open':'');
    d.innerHTML='<div class="nh" onclick="tog('+n.id+')">'
      +'<div class="niw '+n.type+'">'+n.icon+'</div>'
      +'<div class="nm"><div class="nti">'+n.title+'</div><div class="nda">'+n.date+'</div></div>'
      +'<div class="nch"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></div>'
      +'</div>'
      +'<div class="nb2"><div class="nbi">'+n.body+'<div class="rbdg">'+(n.read?'✓ נקרא':'● חדש')+'</div></div></div>';
    l.appendChild(d);
  });
}

function tog(id){
  open[id]=!open[id];
  const n=notifs.find(x=>x.id===id);
  if(n) n.read=true;
  render();
}
