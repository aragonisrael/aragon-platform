const DAYS=['ראשון','שני','שלישי','רביעי','חמישי','שישי'];

const LINE_MAJOR='#1e3250', LINE_MINOR='#0d1a2c';

let instructors=['ישראל ישראלי','שירה כהן','ויקטור לוי','רונית אברהם','דני שפירא'];
function toMin(t){const[h,m]=t.split(':').map(Number);return(h-START_HOUR)*60+m;}
function minToStr(m){const h=Math.floor(m/60)+START_HOUR,mm=m%60;return`${String(h).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;}

let groups=[
  {id:1, name:'הייטק ג׳וניור',     city:'ר"ג',    venue:'בי"ס בן גוריון',    instructor:'ישראל ישראלי', day:0, startMin:toMin('16:00'), dur:60, status:'green',  grades:['ד','ה']},

/* ═══════════════════════════════════════════════
   OVERLAP LAYOUT  — interval-graph column packing
   Each block gets:  .col (0-based)  .numCols (width divisor)
   numCols = size of the largest clique it belongs to.
   ═══════════════════════════════════════════════ */
function layoutDay(blocks) {
  // 1. sort by start time
  const bs = [...blocks].sort((a,b)=>a.startMin-b.startMin);
  bs.forEach(b=>{ b.endMin = b.startMin + b.dur; });

  // 2. greedy column assignment (interval scheduling)
  //    cols[c] = last endMin placed in column c
  const colEnd = [];
  bs.forEach(b=>{
    let placed = false;
    for(let c=0;c<colEnd.length;c++){
      if(colEnd[c] <= b.startMin){ // column is free
        b.col = c;
        colEnd[c] = b.endMin;
        placed = true;
        break;
      }
    }
    if(!placed){ b.col = colEnd.length; colEnd.push(b.endMin); }
  });

  // 3. for every block, numCols = max number of blocks that overlap simultaneously
  //    = size of the largest "clique" it participates in
  bs.forEach(b=>{
    // find all blocks that overlap with b (including b itself)
    const overlapping = bs.filter(o => o.startMin < b.endMin && o.endMin > b.startMin);
    b.numCols = overlapping.length;
  });

  // 4. second pass: make numCols consistent within each clique
  //    (if A overlaps B and B overlaps C, all three need numCols = 3)
  //    use union-find style propagation
  let changed = true;
  while(changed){
    changed = false;
    bs.forEach(b=>{
      const overlapping = bs.filter(o => o.startMin < b.endMin && o.endMin > b.startMin);
      const mx = Math.max(...overlapping.map(o=>o.numCols));
      overlapping.forEach(o=>{ if(o.numCols < mx){ o.numCols = mx; changed = true; } });
    });
  }

  return bs;
}

function getOpacity(g){
  if(currentFilter==='all') return 1;
  if(currentFilter==='unassigned') return g.status==='red'?1:0.08;
  if(!selectedInstructor) return 0.12;
  if(g.instructor===selectedInstructor) return 1;
  const ovG=document.getElementById('ovGreen')?.checked,
        ovY=document.getElementById('ovYellow')?.checked,
        ovR=document.getElementById('ovRed')?.checked;
  if(g.status==='green'  && ovG) return 0.2;
  if(g.status==='yellow' && ovY) return 0.2;
  if(g.status==='red'    && ovR) return 0.2;
  return 0;
}

function renderGrid(){
  const totalPx = TOTAL_MIN * PX_PER_MIN;

  // time column
  let timeHtml='';
  for(let m=0;m<TOTAL_MIN;m+=30){
    const major=m%60===0;
    timeHtml+=`<div style="position:absolute;top:${m*PX_PER_MIN}px;left:0;right:0;height:${30*PX_PER_MIN}px;
      border-bottom:${major?'1.5px':'1px'} solid ${major?LINE_MAJOR:LINE_MINOR};
      display:flex;align-items:flex-start;justify-content:center;padding-top:3px;
      font-family:'Orbitron',monospace;font-size:9px;color:${major?'#2a4a6a':'transparent'};">
      ${major?minToStr(m):''}</div>`;
  }

  // day columns
  let dayCols='';
  for(let di=0;di<6;di++){
    const laid = layoutDay(groups.filter(g=>g.day===di));

    // grid lines
    let lines='';
    for(let m=0;m<TOTAL_MIN;m+=30){
      const major=m%60===0;
      lines+=`<div style="position:absolute;top:${m*PX_PER_MIN}px;left:0;right:0;height:${30*PX_PER_MIN}px;
        border-bottom:${major?'1.5px':'1px'} solid ${major?LINE_MAJOR:LINE_MINOR};pointer-events:none;"></div>`;
    }

    let blocks='';
    laid.forEach(b=>{
      const op = getOpacity(b);
      if(op===0) return;

      const topPx   = b.startMin * PX_PER_MIN;
      const hPx     = Math.max(b.dur * PX_PER_MIN - 2, 18);
      const n       = b.numCols;
      const colW    = (100 / n);                    // % width per column
      // RTL layout: col 0 → rightmost, col n-1 → leftmost
      const rightPct = (b.col / n) * 100;
      const widthStr = `calc(${colW}% - ${GAP*(n>1?1:0)}px)`;
      const startStr = minToStr(b.startMin), endStr = minToStr(b.endMin);

      blocks+=`<div class="block block-${b.status}"
        style="top:${topPx}px;right:${rightPct}%;width:${widthStr};height:${hPx}px;opacity:${op};"
        onclick="openBlockModal(${b.id})"
        onmouseenter="showTT(event,${b.id})"
        onmouseleave="hideTT()">
        <div class="bname">${b.name}</div>
        ${hPx>30?`<div class="bmeta">${b.city}${b.instructor?' · '+b.instructor.split(' ')[0]:' · ⚠'}</div>`:''}
        ${hPx>20?`<div class="btime">${startStr}–${endStr}</div>`:''}
      </div>`;
    });

    dayCols+=`<div class="day-col-body" style="position:relative;height:${totalPx}px;">${lines}${blocks}</div>`;
  }

  document.getElementById('schedWrap').innerHTML=`
    <div class="sched-wrap">
      <div class="col-header time-hdr">שעה</div>
      ${DAYS.map(d=>`<div class="col-header">${d}</div>`).join('')}
      <div class="time-col-body" style="position:relative;height:${totalPx}px;">${timeHtml}</div>
      ${dayCols}
    </div>`;
}

function showTT(e,id){

  document.getElementById('ttName').textContent=g.name;

  document.getElementById('ttVenue').textContent=g.venue;
  document.getElementById('ttTime').textContent=`${DAYS[g.day]} ${minToStr(g.startMin)}–${minToStr(g.startMin+g.dur)}`;
  document.getElementById('ttInst').textContent=g.instructor||'ללא מדריך';
  const ts=document.getElementById('ttStatus');
  ts.textContent=STATUSLABEL[g.status]; ts.className='tt-status sc-'+g.status;
  positionTT(e); document.getElementById('tooltip').classList.add('show');
}
function positionTT(e){
  const tt=document.getElementById('tooltip'); tt.style.display='block';
  const tw=tt.offsetWidth||200, th=tt.offsetHeight||120;
  let x=e.clientX+14, y=e.clientY+14;
  if(x+tw>window.innerWidth-10)  x=e.clientX-tw-14;
  if(y+th>window.innerHeight-10) y=e.clientY-th-14;
  tt.style.left=x+'px'; tt.style.top=y+'px';
}
function hideTT(){document.getElementById('tooltip').classList.remove('show');}
document.addEventListener('mousemove',e=>{if(document.getElementById('tooltip').classList.contains('show'))positionTT(e);});

function ptm(s){const c=s.trim().replace('.',':');const[h,m]=c.split(':').map(Number);if(isNaN(h))return null;return(h-START_HOUR)*60+(isNaN(m)?0:m);}
function saveEdit(id){const g=groups.find(x=>x.id===id);const s=ptm(document.getElementById('eStart').value),e=ptm(document.getElementById('eEnd').value);if(s===null||e===null||e<=s){toastWarn('שעות לא תקינות');return;}g.name=document.getElementById('eGroupName').value;g.city=document.getElementById('eCity').value;g.venue=document.getElementById('eVenue').value;g.day=parseInt(document.getElementById('eDay').value);g.startMin=s;g.dur=e-s;closeModal();renderGrid();toast('הקבוצה עודכנה ✓');}

  const sorted=[...groups].sort((a,b)=>a.city.localeCompare(b.city,'he'));
  const ghtml=sorted.map(g=>`<div class="group-option" id="go_${g.id}" onclick="selectGroup(${g.id})"><div><div class="go-name">${g.name}</div><div class="go-meta">${g.city} · ${g.venue} · ${DAYS[g.day]} ${minToStr(g.startMin)}</div></div><i class="ti ti-check go-check"></i></div>`).join('');
  showModal(`<div class="mhead"><div class="mtitle" style="color:#00d8b0;"><i class="ti ti-user-star"></i>הוספת תלמידים לקבוצה</div><button class="mclose" onclick="closeModal()"><i class="ti ti-x"></i></button></div><div class="mbody"><div class="mfield"><label>שמות התלמידים</label><div id="studentRows"><div class="student-row" id="srow_1"><input class="minput" id="sname_1" placeholder="שם מלא של תלמיד"/><button class="remove-row-btn" onclick="removeRow(1)"><i class="ti ti-x"></i></button></div></div><button class="add-row-btn" onclick="addStudentRow()"><i class="ti ti-plus"></i> הוסף תלמיד נוסף</button></div><div class="mfield"><label>שיוך לקבוצה (ממוין לפי עיר)</label><div class="group-search-wrap"><input class="minput" id="groupSearch" placeholder="חפש קבוצה..." oninput="filterGroups(this.value)"/><i class="ti ti-search search-icon"></i></div><div class="group-select-list" id="groupList">${ghtml}</div></div><div class="mrow"><button class="msave" style="background:linear-gradient(135deg,#041818,#062828);border-color:#00d8b044;color:#00d8b0;" onclick="saveStudents()">הוסף תלמידים</button><button class="mcancel" onclick="closeModal()">ביטול</button></div></div>`);
}
function addStudentRow(){studentRows++;const wrap=document.getElementById('studentRows');const div=document.createElement('div');div.className='student-row';div.id=`srow_${studentRows}`;div.innerHTML=`<input class="minput" id="sname_${studentRows}" placeholder="שם מלא"/><button class="remove-row-btn" onclick="removeRow(${studentRows})"><i class="ti ti-x"></i></button>`;wrap.appendChild(div);document.getElementById(`sname_${studentRows}`).focus();}
function removeRow(n){const el=document.getElementById(`srow_${n}`);if(el)el.remove();}
function selectGroup(id){if(selectedGroupId){const p=document.getElementById(`go_${selectedGroupId}`);if(p)p.classList.remove('selected');}selectedGroupId=id;const el=document.getElementById(`go_${id}`);if(el)el.classList.add('selected');}
function filterGroups(q){const sorted=[...groups].sort((a,b)=>a.city.localeCompare(b.city,'he'));document.getElementById('groupList').innerHTML=sorted.filter(g=>!q||g.name.includes(q)||g.city.includes(q)||g.venue.includes(q)).map(g=>`<div class="group-option${g.id===selectedGroupId?' selected':''}" id="go_${g.id}" onclick="selectGroup(${g.id})"><div><div class="go-name">${g.name}</div><div class="go-meta">${g.city} · ${g.venue} · ${DAYS[g.day]} ${minToStr(g.startMin)}</div></div><i class="ti ti-check go-check"></i></div>`).join('');}
function saveStudents(){if(!selectedGroupId){toastWarn('נא לבחור קבוצה');return;}const names=[...document.querySelectorAll('[id^="sname_"]')].map(i=>i.value.trim()).filter(Boolean);if(!names.length){toastWarn('נא להזין שם לפחות אחד');return;}const g=groups.find(x=>x.id===selectedGroupId);closeModal();toast(`${names.length} תלמידים נוספו ל${g.name} · ${g.city} ✓`);}

function showModal(h){document.getElementById('modalRoot').innerHTML=`<div class="modal-bg" onclick="closeBg(event)"><div class="modal">${h}</div></div>`;}
function closeModal(){document.getElementById('modalRoot').innerHTML='';}
function closeBg(e){if(e.target.classList.contains('modal-bg'))closeModal();}
function toast(msg){addT(msg,'');}function toastWarn(msg){addT(msg,'warn');}
function addT(msg,cls){const c=document.getElementById('tc');const t=document.createElement('div');t.className='toast'+(cls?' '+cls:'');t.innerHTML='<i class="ti ti-check"></i>'+msg;c.appendChild(t);setTimeout(()=>t.remove(),3000);}

rebuildInstSelect();
renderGrid();
</script>
